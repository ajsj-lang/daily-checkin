name: Daily Check-in



on:

  schedule:
  
    - cron: '0 1 * * *' # 每天北京时间 9:00 运行 (UTC 1:00)
    
  workflow_dispatch: # 支持手动触发
  


jobs:

  checkin:
  
    runs-on: ubuntu-latest
    
    steps:
    
      - name: Checkout code
      
        uses: actions/checkout@v3
        


      - name: Update README
      
        run: |
        
          DATE=$(date +'%Y-%m-%d')
          
          QUOTE="持之以恒，方得始终。"
          
          echo "- $DATE | GitHub Actions 自动打卡: $QUOTE" >> README.md
          

          
      - name: Commit and Push
      
        run: |
        
          git config --global user.name "GitHub Action"
          
          git config --global user.email "action@github.com"
          
          git add README.md
          
          git commit -m "Daily Check-in: $(date +'%Y-%m-%d') [Actions]"
          
          git push
          
concurrency: 






















